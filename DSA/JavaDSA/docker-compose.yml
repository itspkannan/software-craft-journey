version: '3.8'

services:
  jupyter-java:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/javadsa_jupyter:latest
    container_name: codingv2-jupyter-java
    ports:
      - "8889:8888"
    volumes:
      - .:/home/jovyan/work
      - jupyter_java_data:/home/jovyan/.jupyter
    working_dir: /home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JAVA_HOME=/opt/java-home
      - NB_USER=jovyan
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --notebook-dir=/home/jovyan/work
      --NotebookApp.token=''
      --NotebookApp.password=''
    networks:
      - javadsa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/lab"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

volumes:
  jupyter_java_data:

networks:
  javadsa-network:
    driver: bridge
