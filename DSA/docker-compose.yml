version: '3.8'

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codingv2-jupyter
    user: root
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
      - jupyter_data:/home/jovyan/.jupyter
    working_dir: /home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PYTHONUNBUFFERED=1
      - NB_USER=jovyan
      - NB_UID=0
      - NB_GID=0
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --notebook-dir=/home/jovyan/work
      --NotebookApp.token=''
      --NotebookApp.password=''
    networks:
      - codingv2-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/lab"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  jupyter_data:

networks:
  codingv2-network:
    driver: bridge
